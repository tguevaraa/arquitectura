<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia Clínica - UMEDIC</title>
    <style>
        :root {
            --primary:      #1a73e8;
            --primary-dark: #1557b0;
            --success:      #34a853;
            --warning:      #f9ab00;
            --danger:       #ea4335;
            --bg:           #f1f3f4;
            --card:         #ffffff;
            --border:       #e0e0e0;
            --text:         #202124;
            --muted:        #5f6368;
            --shadow:       0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
            --shadow-lg:    0 4px 20px rgba(0,0,0,.15);
            --radius:       8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            min-height: 100vh;
        }

        /* ── Header ── */
        .app-header {
            background: var(--primary);
            color: #fff;
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }
        .brand { font-size: 15px; font-weight: 700; letter-spacing: .2px; display: flex; align-items: center; gap: 10px; }
        .brand-sub { font-size: 12px; font-weight: 400; opacity: .75; }
        .breadcrumb { font-size: 13px; opacity: .85; }
        .breadcrumb a { color: rgba(255,255,255,.8); text-decoration: none; }
        .breadcrumb a:hover { color: #fff; }
        .header-right { display: flex; align-items: center; gap: 14px; }
        .btn-logout {
            background: rgba(255,255,255,.15); border: none; color: #fff;
            padding: 6px 16px; border-radius: 6px; cursor: pointer;
            font-size: 13px; font-weight: 500; transition: background .2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,.28); }

        main { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }

        /* ── Tarjeta del paciente ── */
        .patient-card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 24px 28px;
            margin-bottom: 20px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .patient-avatar {
            width: 72px; height: 72px; border-radius: 50%;
            background: #e8f0fe; display: flex; align-items: center;
            justify-content: center; font-size: 32px; flex-shrink: 0;
            border: 3px solid var(--primary);
        }
        .patient-info h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .patient-meta { display: flex; flex-wrap: wrap; gap: 12px 24px; margin-top: 8px; }
        .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
        .meta-label { font-weight: 600; color: var(--text); }
        .meta-badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
        }
        .badge-sangre { background: #fce8e6; color: #c5221f; }
        .badge-seguro { background: #e8f0fe; color: #1a73e8; }

        /* ── Tabs ── */
        .tabs-section {
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .tabs-header {
            display: flex;
            border-bottom: 2px solid var(--border);
            background: #fafafa;
            padding: 0 20px;
        }
        .tab-btn {
            padding: 14px 20px; border: none; background: none;
            cursor: pointer; font-size: 14px; color: var(--muted);
            white-space: nowrap; border-bottom: 3px solid transparent;
            margin-bottom: -2px; transition: all .2s; font-weight: 500;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
        .tab-btn:hover:not(.active) { color: var(--text); background: #f1f3f4; }
        .tab-panel { display: none; padding: 20px; }
        .tab-panel.active { display: block; }

        /* ── Toolbar ── */
        .tab-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .tab-toolbar h3 { font-size: 15px; font-weight: 700; }

        /* ── Botones ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 18px; border-radius: 6px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all .2s; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { filter: brightness(.9); }
        .btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--border); font-weight: 500; }
        .btn-secondary:hover { background: #f1f3f4; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* ── Tarjeta de consulta ── */
        .consulta-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .consulta-header {
            background: #f8f9fa;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .consulta-header:hover { background: #e8f0fe; }
        .consulta-title { font-weight: 700; font-size: 14px; }
        .consulta-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
        .consulta-chevron { color: var(--muted); transition: transform .2s; font-size: 16px; }
        .consulta-card.open .consulta-chevron { transform: rotate(90deg); }
        .consulta-body { display: none; padding: 16px; border-top: 1px solid var(--border); }
        .consulta-card.open .consulta-body { display: block; }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        .field-row.full { grid-template-columns: 1fr; }
        .field-group { display: flex; flex-direction: column; gap: 4px; }
        .field-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
        .field-value { font-size: 14px; color: var(--text); line-height: 1.5; }
        .field-value.empty { color: var(--muted); font-style: italic; }

        /* ── Documentos de la consulta ── */
        .docs-mini { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
        .docs-mini-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        .doc-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .doc-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 10px; border-radius: 20px; font-size: 12px;
            background: #e8f0fe; color: var(--primary); border: 1px solid #c5d9f7;
            text-decoration: none; transition: background .15s;
        }
        .doc-chip:hover { background: #d2e3fc; }

        /* ── Tabla de documentos ── */
        .docs-table { width: 100%; border-collapse: collapse; }
        .docs-table th {
            background: #f8f9fa; color: var(--muted); font-size: 11px;
            font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
            padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--border);
        }
        .docs-table td {
            padding: 10px 12px; border-bottom: 1px solid #f0f0f0;
            font-size: 13px; vertical-align: middle;
        }
        .docs-table tr:last-child td { border-bottom: none; }
        .docs-table tr:hover td { background: #f8f9fa; }
        .tipo-badge {
            display: inline-block; padding: 2px 9px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
        }
        .tipo-historia { background: #e6f4ea; color: #1e8e3e; }
        .tipo-orden    { background: #fef7e0; color: #b06000; }
        .tipo-resultado{ background: #e8f0fe; color: #1a73e8; }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.45); z-index: 1000;
            align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(3px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff; border-radius: 12px;
            box-shadow: 0 24px 64px rgba(0,0,0,.25);
            width: 100%; max-height: 92vh;
            display: flex; flex-direction: column;
            animation: modalIn .2s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-16px) scale(.97); }
            to   { opacity: 1; transform: none; }
        }
        .modal-md { max-width: 640px; }
        .modal-sm { max-width: 480px; }
        .modal-header {
            padding: 18px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: #fafafa; border-radius: 12px 12px 0 0; flex-shrink: 0;
        }
        .modal-header h2 { font-size: 16px; font-weight: 700; }
        .modal-close {
            background: none; border: none; font-size: 18px;
            cursor: pointer; color: var(--muted); width: 32px; height: 32px;
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: #f1f3f4; color: var(--text); }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
        .modal-footer {
            padding: 16px 24px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; justify-content: flex-end;
            background: #fafafa; border-radius: 0 0 12px 12px; flex-shrink: 0;
        }

        /* ── Form ── */
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
        .req { color: var(--danger); }
        .form-control {
            border: 1px solid var(--border); border-radius: 6px;
            padding: 8px 12px; font-size: 14px; outline: none;
            transition: border .2s; width: 100%; background: #fff; color: var(--text);
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
        textarea.form-control { resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        /* ── Upload area ── */
        .upload-area {
            border: 2px dashed var(--border); border-radius: 8px;
            padding: 24px; text-align: center; cursor: pointer;
            color: var(--muted); transition: all .2s; background: #fafafa;
        }
        .upload-area:hover { border-color: var(--primary); color: var(--primary); background: #e8f0fe; }
        .upload-area.has-file { border-color: var(--success); background: #e6f4ea; color: #1e8e3e; }

        /* ── Empty state ── */
        .empty-state { text-align: center; padding: 40px 24px; color: var(--muted); }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            color: #fff; padding: 12px 20px; border-radius: 8px;
            box-shadow: var(--shadow-lg); font-size: 14px; max-width: 340px;
            display: none; animation: toastIn .25s ease;
        }
        .toast.show { display: block; }
        .toast.success { background: var(--success); }
        .toast.error   { background: var(--danger); }
        .toast.info    { background: #333; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

        .spinner {
            display: inline-block; width: 15px; height: 15px;
            border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
            border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 700px) {
            .patient-card { flex-direction: column; }
            .field-row { grid-template-columns: 1fr; }
            main { padding: 12px; }
        }
    </style>
</head>
<body>

<!-- ====== HEADER ====== -->
<header class="app-header">
    <div style="display:flex;flex-direction:column;gap:2px;">
        <div class="brand">
            <span style="font-size:20px">&#9877;</span>
            UMEDIC
            <span class="brand-sub">UNIDAD MEDICA CENTRAL</span>
        </div>
        <div class="breadcrumb">
            <a href="dashboard.html">&#8592; Panel de Atenciones</a>
            &nbsp;/&nbsp; Historia Cl&iacute;nica
        </div>
    </div>
    <div class="header-right">
        <button class="btn-logout" onclick="api.logout()">Cerrar sesi&oacute;n</button>
    </div>
</header>

<!-- ====== MAIN ====== -->
<main>

    <!-- Tarjeta del paciente -->
    <div class="patient-card" id="patientCard">
        <div class="patient-avatar">&#128100;</div>
        <div class="patient-info" style="flex:1;">
            <div style="display:inline-block;width:180px;height:22px;background:#e0e0e0;border-radius:4px;" id="skeletonNombre"></div>
            <div class="patient-meta" id="patientMeta"></div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-section">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="cambiarTab(this,'tabConsultas')">
                &#128203; Consultas cl&iacute;nicas
            </button>
            <button class="tab-btn" onclick="cambiarTab(this,'tabDocumentos')">
                &#128193; Documentos
            </button>
        </div>

        <!-- Tab: Consultas -->
        <div class="tab-panel active" id="tabConsultas">
            <div class="tab-toolbar">
                <h3>Historial de Consultas</h3>
                <button class="btn btn-primary" id="btnNuevaConsulta" onclick="abrirModalConsulta()">
                    &#43; Nueva Consulta
                </button>
            </div>
            <div id="listaConsultas">
                <div class="empty-state">
                    <div style="width:30px;height:30px;border:3px solid #ddd;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;"></div>
                    <p>Cargando consultas...</p>
                </div>
            </div>
        </div>

        <!-- Tab: Documentos -->
        <div class="tab-panel" id="tabDocumentos">
            <div class="tab-toolbar">
                <h3>Todos los Documentos</h3>
            </div>
            <div id="listaDocumentos">
                <div class="empty-state">
                    <div style="width:30px;height:30px;border:3px solid #ddd;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;"></div>
                    <p>Cargando documentos...</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="toast" id="toast"></div>

<!-- ====================================================
     MODAL: Nueva Consulta
     ==================================================== -->
<div class="modal-overlay" id="overlayConsulta">
    <div class="modal modal-md" role="dialog" aria-modal="true">
        <div class="modal-header">
            <h2>Registrar Nueva Consulta</h2>
            <button class="modal-close" onclick="cerrarModal('overlayConsulta')" aria-label="Cerrar">&#x2715;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Motivo de la consulta <span class="req">*</span></label>
                <textarea class="form-control" id="cMotivo" rows="3" placeholder="Describa el motivo..." required></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Diagn&oacute;stico</label>
                    <textarea class="form-control" id="cDiagnostico" rows="3" placeholder="Diagn&oacute;stico m&eacute;dico..."></textarea>
                </div>
                <div class="form-group">
                    <label>Tratamiento</label>
                    <textarea class="form-control" id="cTratamiento" rows="3" placeholder="Medicamentos, indicaciones..."></textarea>
                </div>
            </div>
            <div class="form-group">
                <label>Ex&aacute;menes de laboratorio</label>
                <textarea class="form-control" id="cExamenesLab" rows="2"
                    placeholder="Ej: Biometr&iacute;a hem&aacute;tica, glucosa, etc."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de imagen solicitada</label>
                    <select class="form-control" id="cTipoImagen">
                        <option value="">Ninguna</option>
                        <option value="rx">Radiograf&iacute;a (RX)</option>
                        <option value="eco">Ecograf&iacute;a (ECO)</option>
                        <option value="ekg">Electrocardiograma (EKG)</option>
                        <option value="tac">Tomograf&iacute;a (TAC)</option>
                        <option value="rm">Resonancia magn&eacute;tica (RM)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Observaciones de la imagen</label>
                    <textarea class="form-control" id="cObsImagen" rows="3" placeholder="Indicaciones u observaciones..."></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('overlayConsulta')">Cancelar</button>
            <button class="btn btn-primary" id="btnGuardarConsulta" onclick="guardarConsulta()">Guardar</button>
        </div>
    </div>
</div>

<!-- ====================================================
     MODAL: Subir Documento
     ==================================================== -->
<div class="modal-overlay" id="overlayDocumento">
    <div class="modal modal-sm" role="dialog" aria-modal="true">
        <div class="modal-header">
            <h2>Subir Documento</h2>
            <button class="modal-close" onclick="cerrarModal('overlayDocumento')" aria-label="Cerrar">&#x2715;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Tipo de documento <span class="req">*</span></label>
                <select class="form-control" id="dTipo">
                    <option value="historia_clinica">Historia cl&iacute;nica</option>
                    <option value="orden_lab">Orden de laboratorio</option>
                    <option value="orden_imagen">Orden de imagen</option>
                    <option value="resultado_lab">Resultado de laboratorio</option>
                    <option value="resultado_imagen">Resultado de imagen</option>
                </select>
            </div>
            <div class="form-group">
                <label>Archivo <span class="req">*</span></label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('archivoInput').click()">
                    <div style="font-size:32px;margin-bottom:8px;">&#128194;</div>
                    <div id="uploadLabel">Clic para seleccionar archivo</div>
                    <div style="font-size:11px;margin-top:6px;opacity:.7;">PDF, imagen, Word, Excel</div>
                </div>
                <input type="file" id="archivoInput" style="display:none"
                       accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.xls,.xlsx"
                       onchange="seleccionarArchivo(this)">
            </div>
            <div id="uploadInfo" style="display:none;font-size:13px;color:var(--success);margin-top:4px;"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="cerrarModal('overlayDocumento')">Cancelar</button>
            <button class="btn btn-primary" id="btnSubir" onclick="subirDocumento()">Subir archivo</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
// ============================================================
// Estado
// ============================================================
const params    = new URLSearchParams(location.search);
const patientId = parseInt(params.get('id'));
let consultas   = [];
let consultaActivaId = null;
let userRole    = null;

if (!localStorage.getItem('token') || !patientId) {
    window.location.href = 'dashboard.html';
}

// Leer rol del token
try {
    const pay = JSON.parse(atob(localStorage.getItem('token').split('.')[1]));
    userRole = pay.role;
} catch (e) {}

// ============================================================
// Init
// ============================================================
async function init() {
    await cargarPaciente();
    await cargarConsultas();
    await cargarDocumentos();

    // Solo staff puede agregar consultas
    if (userRole === 'patient') {
        const btn = document.getElementById('btnNuevaConsulta');
        if (btn) btn.style.display = 'none';
    }
}

// ============================================================
// Cargar datos del paciente
// ============================================================
async function cargarPaciente() {
    try {
        const p = await api.getPatient(patientId);
        if (!p || p.detail) return;

        const nombre = p.user ? p.user.full_name : `PAC-${patientId}`;
        document.title = `${nombre} - Historia Clínica`;
        document.getElementById('skeletonNombre').outerHTML =
            `<h1 style="font-size:22px;font-weight:800;margin-bottom:6px;">${esc(nombre)}</h1>`;

        const meta = document.getElementById('patientMeta');
        const items = [];

        if (p.cedula) items.push(`<div class="meta-item"><span class="meta-label">C&eacute;dula:</span> ${esc(p.cedula)}</div>`);
        if (p.fecha_nacimiento) {
            const edad = calcEdad(p.fecha_nacimiento);
            items.push(`<div class="meta-item"><span class="meta-label">Edad:</span> ${edad} a&ntilde;os</div>`);
        }
        if (p.sexo) items.push(`<div class="meta-item"><span class="meta-label">Sexo:</span> ${p.sexo === 'M' ? 'Masculino' : 'Femenino'}</div>`);
        if (p.telefono) items.push(`<div class="meta-item"><span class="meta-label">Tel&eacute;fono:</span> ${esc(p.telefono)}</div>`);
        if (p.grupo_sanguineo) items.push(`<div class="meta-item"><span class="meta-label">Grupo sangu&iacute;neo:</span> <span class="meta-badge badge-sangre">${esc(p.grupo_sanguineo)}</span></div>`);
        if (p.tipo_seguro) items.push(`<div class="meta-item"><span class="meta-label">Seguro:</span> <span class="meta-badge badge-seguro">${esc(p.tipo_seguro)}</span></div>`);
        if (p.ciudad) items.push(`<div class="meta-item"><span class="meta-label">Ciudad:</span> ${esc(p.ciudad)}</div>`);

        meta.innerHTML = items.join('') || '<span style="color:var(--muted);">Sin datos adicionales registrados.</span>';
    } catch (e) {
        document.getElementById('skeletonNombre').outerHTML = `<h1>Historia Cl&iacute;nica &mdash; PAC-${patientId}</h1>`;
    }
}

function calcEdad(fechaStr) {
    const hoy = new Date();
    const nac = new Date(fechaStr);
    let edad = hoy.getFullYear() - nac.getFullYear();
    if (hoy.getMonth() < nac.getMonth() ||
        (hoy.getMonth() === nac.getMonth() && hoy.getDate() < nac.getDate())) edad--;
    return edad;
}

// ============================================================
// Cargar consultas
// ============================================================
async function cargarConsultas() {
    try {
        consultas = await api.getConsultas(patientId);
        renderConsultas();
    } catch (e) {
        document.getElementById('listaConsultas').innerHTML =
            '<div class="empty-state"><div class="empty-icon">&#9888;</div><p>Error al cargar las consultas.</p></div>';
    }
}

function renderConsultas() {
    const cont = document.getElementById('listaConsultas');
    if (!consultas.length) {
        cont.innerHTML = `<div class="empty-state">
            <div class="empty-icon">&#128203;</div>
            <p>No hay consultas registradas para este paciente.</p>
        </div>`;
        return;
    }

    const IMAGEN = { rx:'Radiograf\u00eda (RX)', eco:'Ecograf\u00eda (ECO)', ekg:'EKG', tac:'Tomograf\u00eda (TAC)', rm:'Resonancia (RM)' };

    cont.innerHTML = consultas.map((c, i) => {
        const fecha = new Date(c.fecha_consulta).toLocaleDateString('es-EC', { day:'2-digit', month:'long', year:'numeric' });
        const docs = c.documentos || [];

        const docsHtml = docs.length ? `
            <div class="docs-mini">
                <div class="docs-mini-title">Documentos adjuntos (${docs.length})</div>
                <div class="doc-chips">
                    ${docs.map(d => d.drive_url
                        ? `<a class="doc-chip" href="${d.drive_url}" target="_blank" rel="noopener">&#128196; ${esc(d.nombre_archivo)}</a>`
                        : `<span class="doc-chip" style="background:#f1f3f4;color:var(--muted);">&#128196; ${esc(d.nombre_archivo)}</span>`
                    ).join('')}
                </div>
            </div>` : '';

        const canUpload = userRole !== 'patient';

        return `<div class="consulta-card" id="consulta-${c.id}">
            <div class="consulta-header" onclick="toggleConsulta(${c.id})">
                <div>
                    <div class="consulta-title">&#128203; ${esc(c.motivo.length > 80 ? c.motivo.slice(0,80)+'...' : c.motivo)}</div>
                    <div class="consulta-meta">${fecha}${c.doctor_name ? ' &mdash; Dr. ' + esc(c.doctor_name) : ''}</div>
                </div>
                <span class="consulta-chevron">&#9654;</span>
            </div>
            <div class="consulta-body">
                <div class="field-row">
                    <div class="field-group">
                        <div class="field-label">Motivo</div>
                        <div class="field-value">${esc(c.motivo)}</div>
                    </div>
                    <div class="field-group">
                        <div class="field-label">Diagn&oacute;stico</div>
                        <div class="field-value ${c.diagnostico ? '' : 'empty'}">${c.diagnostico ? esc(c.diagnostico) : 'No registrado'}</div>
                    </div>
                </div>
                <div class="field-row">
                    <div class="field-group">
                        <div class="field-label">Tratamiento</div>
                        <div class="field-value ${c.tratamiento ? '' : 'empty'}">${c.tratamiento ? esc(c.tratamiento) : 'No registrado'}</div>
                    </div>
                    <div class="field-group">
                        <div class="field-label">Ex&aacute;menes de laboratorio</div>
                        <div class="field-value ${c.examenes_lab ? '' : 'empty'}">${c.examenes_lab ? esc(c.examenes_lab) : 'Ninguno'}</div>
                    </div>
                </div>
                ${c.tipo_imagen ? `<div class="field-row full">
                    <div class="field-group">
                        <div class="field-label">Imagen solicitada</div>
                        <div class="field-value">${IMAGEN[c.tipo_imagen] || esc(c.tipo_imagen)}</div>
                    </div>
                    ${c.observaciones_imagen ? `<div class="field-group">
                        <div class="field-label">Observaciones imagen</div>
                        <div class="field-value">${esc(c.observaciones_imagen)}</div>
                    </div>` : ''}
                </div>` : ''}
                ${docsHtml}
                ${canUpload ? `<div style="margin-top:12px;">
                    <button class="btn btn-secondary btn-sm" onclick="abrirSubirDoc(${c.id}); event.stopPropagation()">
                        &#128194; Subir documento
                    </button>
                </div>` : ''}
            </div>
        </div>`;
    }).join('');
}

function toggleConsulta(id) {
    const card = document.getElementById(`consulta-${id}`);
    card.classList.toggle('open');
}

// ============================================================
// Cargar documentos
// ============================================================
async function cargarDocumentos() {
    try {
        const docs = await api.getDocumentos(patientId);
        renderDocumentos(docs);
    } catch (e) {
        document.getElementById('listaDocumentos').innerHTML =
            '<div class="empty-state"><div class="empty-icon">&#9888;</div><p>Error al cargar los documentos.</p></div>';
    }
}

const TIPO_LABELS = {
    historia_clinica: ['Historia Cl&iacute;nica', 'tipo-historia'],
    orden_lab:        ['Orden de Lab.', 'tipo-orden'],
    orden_imagen:     ['Orden de Imagen', 'tipo-orden'],
    resultado_lab:    ['Resultado Lab.', 'tipo-resultado'],
    resultado_imagen: ['Resultado Imagen', 'tipo-resultado'],
};

function renderDocumentos(docs) {
    const cont = document.getElementById('listaDocumentos');
    if (!docs.length) {
        cont.innerHTML = `<div class="empty-state">
            <div class="empty-icon">&#128193;</div>
            <p>No hay documentos subidos para este paciente.</p>
        </div>`;
        return;
    }

    cont.innerHTML = `<table class="docs-table">
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Nombre del archivo</th>
                <th>Fecha</th>
                <th>Enlace</th>
            </tr>
        </thead>
        <tbody>
            ${docs.map(d => {
                const [label, cls] = TIPO_LABELS[d.tipo] || [d.tipo, 'tipo-resultado'];
                const fecha = new Date(d.created_at).toLocaleDateString('es-EC');
                const link = d.drive_url
                    ? `<a href="${d.drive_url}" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">&#128196; Abrir en Drive</a>`
                    : `<span style="color:var(--muted);font-size:12px;">Sin enlace</span>`;
                return `<tr>
                    <td><span class="tipo-badge ${cls}">${label}</span></td>
                    <td>${esc(d.nombre_archivo)}</td>
                    <td>${fecha}</td>
                    <td>${link}</td>
                </tr>`;
            }).join('')}
        </tbody>
    </table>`;
}

// ============================================================
// Tabs
// ============================================================
function cambiarTab(btn, panelId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(panelId).classList.add('active');
}

// ============================================================
// Modal Nueva Consulta
// ============================================================
function abrirModalConsulta() {
    document.getElementById('cMotivo').value       = '';
    document.getElementById('cDiagnostico').value  = '';
    document.getElementById('cTratamiento').value  = '';
    document.getElementById('cExamenesLab').value  = '';
    document.getElementById('cTipoImagen').value   = '';
    document.getElementById('cObsImagen').value    = '';
    document.getElementById('overlayConsulta').classList.add('active');
}

async function guardarConsulta() {
    const motivo = document.getElementById('cMotivo').value.trim();
    if (!motivo) { showToast('El motivo es obligatorio.', 'error'); return; }

    const btn = document.getElementById('btnGuardarConsulta');
    btn.innerHTML = '<span class="spinner"></span> Guardando...';
    btn.disabled  = true;

    try {
        const data = {
            motivo,
            diagnostico:         document.getElementById('cDiagnostico').value.trim() || null,
            tratamiento:         document.getElementById('cTratamiento').value.trim() || null,
            examenes_lab:        document.getElementById('cExamenesLab').value.trim() || null,
            tipo_imagen:         document.getElementById('cTipoImagen').value || null,
            observaciones_imagen:document.getElementById('cObsImagen').value.trim() || null,
        };
        const res = await api.createConsulta(patientId, data);
        if (res && res.id) {
            showToast('Consulta registrada correctamente.', 'success');
            cerrarModal('overlayConsulta');
            await cargarConsultas();
        } else {
            showToast('Error: ' + (res.detail || 'No se pudo guardar.'), 'error');
        }
    } catch (e) {
        showToast('Error de conexi\u00f3n.', 'error');
    } finally {
        btn.innerHTML = 'Guardar';
        btn.disabled  = false;
    }
}

// ============================================================
// Modal Subir Documento
// ============================================================
function abrirSubirDoc(consultaId) {
    consultaActivaId = consultaId;
    document.getElementById('archivoInput').value  = '';
    document.getElementById('dTipo').value          = 'historia_clinica';
    document.getElementById('uploadLabel').textContent = 'Clic para seleccionar archivo';
    document.getElementById('uploadArea').classList.remove('has-file');
    document.getElementById('uploadInfo').style.display = 'none';
    document.getElementById('overlayDocumento').classList.add('active');
}

function seleccionarArchivo(input) {
    if (!input.files[0]) return;
    const f = input.files[0];
    document.getElementById('uploadLabel').textContent = f.name;
    document.getElementById('uploadArea').classList.add('has-file');
    document.getElementById('uploadInfo').style.display = 'block';
    document.getElementById('uploadInfo').textContent   =
        `Archivo seleccionado: ${f.name} (${(f.size / 1024).toFixed(1)} KB)`;
}

async function subirDocumento() {
    const archivo = document.getElementById('archivoInput').files[0];
    if (!archivo) { showToast('Seleccione un archivo.', 'error'); return; }

    const tipo = document.getElementById('dTipo').value;
    const btn  = document.getElementById('btnSubir');
    btn.innerHTML = '<span class="spinner"></span> Subiendo...';
    btn.disabled  = true;

    try {
        const res = await api.subirDocumento(patientId, consultaActivaId, tipo, archivo);
        if (res && res.id) {
            showToast('Documento subido correctamente.', 'success');
            cerrarModal('overlayDocumento');
            await cargarConsultas();
            await cargarDocumentos();
        } else {
            showToast('Error: ' + (res.detail || 'No se pudo subir el archivo.'), 'error');
        }
    } catch (e) {
        showToast('Error de conexi\u00f3n.', 'error');
    } finally {
        btn.innerHTML = 'Subir archivo';
        btn.disabled  = false;
    }
}

// ============================================================
// Utilidades
// ============================================================
function cerrarModal(id) { document.getElementById(id).classList.remove('active'); }

document.querySelectorAll('.modal-overlay').forEach(o => {
    o.addEventListener('click', e => { if (e.target === o) cerrarModal(o.id); });
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape')
        document.querySelectorAll('.modal-overlay.active').forEach(o => cerrarModal(o.id));
});

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer;
function showToast(msg, tipo = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${tipo}`;
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 3800);
}

// ============================================================
// Arranque
// ============================================================
init();
</script>
</body>
</html>
