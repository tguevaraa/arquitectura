<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gestión Médica</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { text-align: center; color: #1a73e8; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #1557b0; }
        .toggle { text-align: center; margin-top: 1rem; color: #666; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Iniciar Sesión</h1>
        <form id="authForm">
            <div class="form-group" id="nameGroup" style="display: none;">
                <label>Nombre Completo</label>
                <input type="text" id="fullName">
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group" id="roleGroup" style="display: none;">
                <label>Rol</label>
                <select id="role">
                    <option value="patient">Paciente</option>
                    <option value="doctor">Doctor</option>
                </select>
            </div>
            <button type="submit">Enviar</button>
        </form>
        <div class="toggle" id="toggleAuth">¿No tienes cuenta? Regístrate</div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('authForm');
        const toggleBtn = document.getElementById('toggleAuth');
        let isLogin = true;

        toggleBtn.onclick = () => {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? 'Iniciar Sesión' : 'Registrarse';
            document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
            document.getElementById('roleGroup').style.display = isLogin ? 'none' : 'block';
            toggleBtn.innerText = isLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia Sesión';
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                if (isLogin) {
                    const res = await api.login(email, password);
                    if (res.access_token) window.location.href = 'dashboard.html';
                    else alert('Error al iniciar sesión: ' + (res.detail || 'Error desconocido'));
                } else {
                    const name = document.getElementById('fullName').value;
                    const role = document.getElementById('role').value;
                    const res = await api.register(email, password, name, role);
                    if (res.id) {
                        alert('¡Registro exitoso! Por favor, inicia sesión.');
                        toggleBtn.click();
                    } else {
                        alert('Error al registrar: ' + JSON.stringify(res.detail));
                    }
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };
    </script>
</body>
</html>
